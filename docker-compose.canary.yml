# ============================================================
# Canary environment
# Usage: docker compose -f docker-compose.canary.yml up -d
# Requires: .env.canary
# ============================================================
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: ${APP_NAME:-laravel}-api:canary
    env_file: .env.canary
    ports:
      - "80:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    env_file: .env.canary
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel_canary}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_canary:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ];
             then redis-server --requirepass "$$REDIS_PASSWORD";
             else redis-server; fi'
    env_file: .env.canary
    volumes:
      - redis_canary:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_canary:
  redis_canary:
